name: homequests

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: homequests
      POSTGRES_USER: homequests
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/homequests/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homequests -d homequests"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/kolossboss/homequests-api:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://homequests:${POSTGRES_PASSWORD}@db:5432/homequests
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 525600
      APNS_ENABLED: "false"
      PUSH_WORKER_ENABLED: "false"
      # Backup-Ziele (im Container). Standard zeigt auf den persistenten Backup-Mount.
      # Optional weitere Pfade via Komma ergänzen, z. B. "/data/backups,/tmp/homequests-backups"
      DB_BACKUP_ALLOWED_DIRS: ${DB_BACKUP_ALLOWED_DIRS:-/data/backups,/tmp/homequests-backups}
      DB_BACKUP_DEFAULT_DIR: ${DB_BACKUP_DEFAULT_DIR:-/data/backups}
      DB_BACKUP_TIMEOUT_SECONDS: ${DB_BACKUP_TIMEOUT_SECONDS:-180}
      DB_BACKUP_UPLOAD_MAX_BYTES: ${DB_BACKUP_UPLOAD_MAX_BYTES:-536870912}
      DB_CLEANUP_MAX_PASSES: ${DB_CLEANUP_MAX_PASSES:-8}

      # Optional: APNs fuer iOS Remote Push
      # APNS_ENABLED: "true"
      # APNS_TEAM_ID: "${APNS_TEAM_ID}"
      # APNS_KEY_ID: "${APNS_KEY_ID}"
      # APNS_BUNDLE_ID: "swapps.HomeQuests"
      # APNS_PRIVATE_KEY_PATH: "/run/secrets/AuthKey.p8"
      # PUSH_WORKER_ENABLED: "true"
      # PUSH_WORKER_INTERVAL_SECONDS: "60"

    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8010:8000"
    volumes:
      # Persistenter Backup-Mount:
      # - Standard (ohne BACKUP_MOUNT_SOURCE): Docker-Volume "homequests_backup_data"
      # - Optional Host-Pfad: BACKUP_MOUNT_SOURCE=/opt/homequests/backups
      - ${BACKUP_MOUNT_SOURCE:-homequests_backup_data}:/data/backups
      # Optional: APNs Key ins API-Container-Dateisystem mounten
      # - /opt/homequests/secrets/AuthKey.p8:/run/secrets/AuthKey.p8:ro

volumes:
  homequests_backup_data:
