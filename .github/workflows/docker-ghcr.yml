name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner_lc }}/homequests-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger HomeQuests HA Add-on Sync
        env:
          DISPATCH_TOKEN: ${{ secrets.HA_ADDON_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "HA_ADDON_DISPATCH_TOKEN ist nicht gesetzt - Add-on Sync Dispatch wurde uebersprungen."
            exit 0
          fi

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/kolossboss/homequests-backend-ha-addon/dispatches \
            -d "{\"event_type\":\"homequests_backend_updated\",\"client_payload\":{\"source_repo\":\"${GITHUB_REPOSITORY}\",\"source_sha\":\"${GITHUB_SHA}\",\"source_ref\":\"${GITHUB_REF_NAME}\"}}"
