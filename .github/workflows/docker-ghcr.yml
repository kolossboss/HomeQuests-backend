name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner_lc }}/homequests-api
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Hinweis bei fehlendem Dispatch-Token
        if: ${{ success() && secrets.HA_ADDON_DISPATCH_TOKEN == '' }}
        run: echo "HA_ADDON_DISPATCH_TOKEN ist nicht gesetzt - Add-on Sync Dispatch wurde uebersprungen."

      - name: Trigger HomeQuests HA Add-on Sync
        if: ${{ success() && secrets.HA_ADDON_DISPATCH_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HA_ADDON_DISPATCH_TOKEN }}
          repository: kolossboss/homequests-backend-ha-addon
          event-type: homequests_backend_updated
          client-payload: >-
            {"source_repo":"${{ github.repository }}","source_sha":"${{ github.sha }}","source_ref":"${{ github.ref_name }}"}
